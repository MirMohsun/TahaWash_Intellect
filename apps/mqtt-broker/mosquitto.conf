# ============================================================================
#  Tahawash — Mosquitto MQTT Broker Configuration
#
#  Порты:
#    1883 — plaintext (только локальная разработка, в prod закрыть firewall-ом)
#    8883 — TLS (prod; раскомментировать секцию TLS ниже когда будут сертификаты)
#
#  Для добавления нового устройства:
#    1. Добавить строку в passwd/devices.txt (см. README.md)
#    2. Добавить ACL-блок в acl/acl.conf
#    3. Перезапустить контейнер: docker compose restart mosquitto
# ============================================================================

# ── Сетевые слушатели ────────────────────────────────────────────────────────

# Plaintext (dev only) — явно слушаем все интерфейсы внутри контейнера
listener 1883 0.0.0.0
protocol mqtt

# WebSocket (опционально — для браузерного дебаггинга через MQTT.js)
# listener 9001
# protocol websockets

# TLS (раскомментировать в prod, когда будут сертификаты в certs/)
# listener 8883
# protocol mqtt
# cafile /mosquitto/config/certs/ca.crt
# certfile /mosquitto/config/certs/server.crt
# keyfile /mosquitto/config/certs/server.key
# require_certificate false

# ── Аутентификация ───────────────────────────────────────────────────────────

# Запрещаем анонимный доступ
allow_anonymous false

# Файл паролей (создаётся mosquitto_passwd, см. README.md)
password_file /mosquitto/config/passwd/devices.txt

# ACL — кто что может читать/писать
acl_file /mosquitto/config/acl/acl.conf

# ── Persistence (сообщения выживают при рестарте) ────────────────────────────

persistence true
persistence_location /mosquitto/data/

# ── Логирование ──────────────────────────────────────────────────────────────

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_type all
log_timestamp true
connection_messages true

# ── Параметры соединения ─────────────────────────────────────────────────────

# Keepalive от Pico: 30 сек (MQTT_KEEPALIVE в main.py)
# Mosquitto разрывает через 1.5 * keepalive = ~45 сек -> тогда срабатывает LWT

# Максимальный размер сообщения (ежедневный отчёт может быть большим)
# 50 событий * ~200 байт = ~10KB, с запасом ставим 256KB
message_size_limit 262144

# Максимум inflight-сообщений на клиента
max_inflight_messages 20
