# ============================================================================
#  Tahawash — MQTT ACL (Access Control List)
#
#  Синтаксис:
#    user <username>
#    topic read  <topic>    — только чтение
#    topic write <topic>    — только запись
#    topic readwrite <topic> — чтение и запись
#    # — wildcard одного уровня (+), любого уровня (#)
#
#  Добавление нового Pico:
#    Скопировать блок "tahawash-device" и заменить HARDWARE_ID на реальный.
#    HARDWARE_ID должен совпадать 1-в-1 с полем hardwareIdentifier в Bay.
# ============================================================================

# ── Backend-сервис ───────────────────────────────────────────────────────────
# NestJS читает статус со ВСЕХ устройств и пишет команды на ЛЮБОЕ устройство.

user tahawash-backend
topic readwrite tahawash/hardware/#

# ── Все Pico-устройства (один общий логин) ───────────────────────────────────
# Каждый Pico знает только свой HARDWARE_ID и подписывается только на свой топик.
# ACL здесь не ограничивает по HARDWARE_ID (один логин = доступ ко всем топикам),
# поэтому безопасность держится на стороне прошивки: Pico сам прописывает
# свой HARDWARE_ID в TOPIC_CONTROL / TOPIC_STATUS.
#
# Если в будущем перейдём на per-device логины — добавить отдельные user-блоки:
#   user tahawash-wash-01
#   topic read  tahawash/hardware/tahawash-wash-01/control
#   topic write tahawash/hardware/tahawash-wash-01/status

user tahawash-device
topic readwrite tahawash/hardware/#

# ── Healthcheck (используется в docker-compose healthcheck) ──────────────────
user healthcheck
topic readwrite test
