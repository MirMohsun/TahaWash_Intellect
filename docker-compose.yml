# Tahawash — local development infrastructure
#
# Provides PostgreSQL (with PostGIS) and Redis for local dev.
# Production uses Railway managed services.
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Wipe:   docker compose down -v        (drops all data)
# Logs:   docker compose logs -f
# Status: docker compose ps

services:
  postgres:
    # PostgreSQL 16 with PostGIS bundled. The postgis/postgis image
    # pre-installs postgis + a few support extensions in the public schema
    # on first boot; Prisma tracks all of them via `extensions = [...]`
    # in schema.prisma so there's no drift.
    image: postgis/postgis:16-3.4-alpine
    container_name: tahawash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tahawash
    ports:
      # Host port 5434 → container port 5432.
      # User already runs a PostgreSQL cluster on the standard ports (5432/5433/5435/5436);
      # we use 5434 to stay isolated.
      - '5434:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d tahawash']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tahawash-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    build:
      context: ./apps/mqtt-broker
      dockerfile: Dockerfile
    container_name: tahawash-mqtt
    restart: unless-stopped
    ports:
      - '1883:1883'
      # - '8883:8883'   раскомментировать когда будут TLS-сертификаты
    volumes:
      # Конфиг и ACL — читаём из репо (read-only)
      - ./apps/mqtt-broker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./apps/mqtt-broker/acl/acl.conf:/mosquitto/config/acl/acl.conf:ro
      # Пароли — монтируем отдельно (файл создаётся вручную, не в git)
      - ./apps/mqtt-broker/passwd:/mosquitto/config/passwd:ro
      # Данные (persistence) и логи — в именованных томах
      - mqtt-data:/mosquitto/data
      - mqtt-logs:/mosquitto/log
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mosquitto_pub -h localhost -p 1883 -u healthcheck -P healthcheck -t test -m ping || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    name: tahawash-postgres-data
  redis-data:
    name: tahawash-redis-data
  mqtt-data:
    name: tahawash-mqtt-data
  mqtt-logs:
    name: tahawash-mqtt-logs
